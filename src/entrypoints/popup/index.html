<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SC Bridge Sync</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Main -->
      <div id="main-screen" class="screen">
        <h2>SC Bridge Sync</h2>
        <div id="status-section">
          <div class="status-row">
            <span>RSI</span>
            <span id="rsi-status" class="badge">checking...</span>
          </div>
          <div class="status-row">
            <span>SC Bridge</span>
            <span id="scbridge-status" class="badge">checking...</span>
          </div>
        </div>

        <div id="last-sync-section" class="hidden">
          <p>Last sync: <span id="last-sync-time"></span></p>
        </div>

        <div class="sync-cta">
          <p>To sync your hangar, initiate the sync from Sync &amp; Import.</p>
          <a id="settings-link" href="https://scbridge.app/sync-import" target="_blank" class="btn btn-primary">
            Open Sync &amp; Import
          </a>
        </div>

        <div id="privacy-section" class="privacy-section">
          <div class="privacy-header">
            <span class="privacy-title">Privacy Mode</span>
            <span class="privacy-desc">Control how dollar values display</span>
          </div>
          <div class="privacy-modes" id="privacy-modes">
            <label class="privacy-option">
              <input type="radio" name="privacy-mode" value="off" checked />
              <span class="privacy-option-info">
                <span class="privacy-option-label">Off</span>
                <span class="privacy-option-desc">Show real values</span>
              </span>
            </label>
            <label class="privacy-option">
              <input type="radio" name="privacy-mode" value="hidden" />
              <span class="privacy-option-info">
                <span class="privacy-option-label">Hidden</span>
                <span class="privacy-option-desc">Replace with &bull;&bull;&bull;</span>
              </span>
            </label>
            <label class="privacy-option">
              <input type="radio" name="privacy-mode" value="stealth" />
              <span class="privacy-option-info">
                <span class="privacy-option-label">Stealth</span>
                <span class="privacy-option-desc">Reduce by percentage</span>
              </span>
            </label>
          </div>
          <div id="stealth-settings" class="stealth-settings hidden">
            <div class="stealth-row">
              <span class="stealth-label">Display percentage</span>
              <span class="stealth-value" id="stealth-value">10%</span>
            </div>
            <input type="range" id="stealth-slider" min="1" max="90" value="10" class="stealth-slider" />
            <p class="stealth-preview" id="stealth-preview">A $1,000 ship will display as $100</p>
          </div>
        </div>

        <div id="env-badge" class="env-badge hidden"></div>
      </div>

      <!-- Dev Tools (Ctrl+Shift+D) -->
      <div id="devtools-screen" class="screen hidden">
        <div class="screen-header">
          <button id="devtools-back-btn" class="btn-icon" title="Back">&larr;</button>
          <h2>Dev Tools</h2>
        </div>

        <div class="form-group">
          <label>Environment</label>
          <div class="env-picker">
            <label class="format-option">
              <input type="radio" name="dev-env" value="production" />
              <span class="format-info">
                <span class="format-label">Production</span>
                <span class="format-desc">scbridge.app</span>
              </span>
            </label>
            <label class="format-option">
              <input type="radio" name="dev-env" value="staging" />
              <span class="format-info">
                <span class="format-label">Staging</span>
                <span class="format-desc">staging.scbridge.app</span>
              </span>
            </label>
          </div>
        </div>

        <p id="devtools-current" class="fine-print"></p>

        <div class="actions">
          <button id="devtools-apply-btn" class="btn btn-primary">
            Apply & Recheck
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
